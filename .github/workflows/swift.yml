name: Swift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v7

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: swift build -v

      - name: Run tests
        run: swift test -v

      - name: SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint --strict

  linux:
    runs-on: ubuntu-latest
    container: swift:6.0

    steps:
      - uses: actions/checkout@v7

      - name: Build
        run: swift build -v

      - name: Run tests
        run: swift test -v
